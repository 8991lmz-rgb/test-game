<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你适合晨间做什么？· 早晨人格测试</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --night: #0d0d1a;
    --dawn: #1a0a2e;
    --gold: #f5c842;
    --moon: #c8d8f0;
    --sun: #ff8c42;
    --rose: #ff6b9d;
    --teal: #42c5c0;
    --text: #e8e0f0;
    --muted: #8880a0;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--night);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield */
  .starfield {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: var(--min, 0.1); transform: scale(1); }
    to { opacity: var(--max, 0.8); transform: scale(1.2); }
  }

  /* Gradient orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.15;
    transition: opacity 1s ease;
  }
  .orb-moon { width: 400px; height: 400px; background: #6060ff; top: -100px; right: -100px; }
  .orb-sun  { width: 300px; height: 300px; background: #ff6030; bottom: -80px; left: -80px; }

  /* Layout */
  .container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeUp 0.8s ease both;
  }
  .header-badge {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    border: 1px solid rgba(245,200,66,0.3);
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(32px, 8vw, 52px);
    font-weight: 900;
    line-height: 1.15;
    background: linear-gradient(135deg, var(--moon) 0%, var(--gold) 50%, var(--sun) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }
  .header p {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    line-height: 1.8;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Progress */
  .progress-wrap {
    margin-bottom: 32px;
    animation: fadeUp 0.8s 0.1s ease both;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #6060ff, var(--gold), var(--sun));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Question card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px 28px;
    margin-bottom: 16px;
    backdrop-filter: blur(12px);
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .q-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 28px;
    color: #f0ecff;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    position: relative;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    color: var(--muted);
    transition: all 0.2s ease;
    background: rgba(255,255,255,0.02);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option:hover {
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
    background: rgba(255,255,255,0.05);
    transform: translateX(4px);
  }
  .option.selected {
    border-color: var(--gold);
    background: rgba(245,200,66,0.08);
    color: var(--gold);
  }
  .option-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid currentColor;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .option.selected .option-dot::after {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gold);
  }
  .option-label { flex: 1; line-height: 1.5; }
  .option-score { font-size: 11px; opacity: 0.4; }

  /* Navigation */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
  }
  .btn {
    padding: 12px 28px;
    border-radius: 40px;
    font-size: 14px;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
  }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .btn-primary {
    background: linear-gradient(135deg, #6060ff, var(--gold));
    color: #0d0d1a;
    font-weight: 700;
  }
  .btn-primary:hover { opacity: 0.9; transform: scale(1.03); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

  /* ===== RESULT ===== */
  .result { display: none; animation: fadeUp 0.8s ease both; }

  .result-hero {
    text-align: center;
    padding: 48px 24px 36px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .result-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, var(--accent-color, #6060ff) 0%, transparent 65%);
    opacity: 0.12;
    pointer-events: none;
  }

  .result-emoji {
    font-size: 64px;
    margin-bottom: 16px;
    display: block;
    line-height: 1;
  }
  .result-type-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .result-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(28px, 7vw, 44px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--result-from, var(--moon)), var(--result-to, var(--gold)));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .result-subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .result-score-ring {
    width: 80px;
    height: 80px;
    margin: 0 auto 24px;
    position: relative;
  }
  .result-score-ring svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 6; }
  .ring-fg { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1); }
  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .ring-label span { font-size: 9px; color: var(--muted); margin-top: -2px; }

  .result-desc {
    font-size: 14px;
    line-height: 1.9;
    color: #b0a8cc;
    text-align: left;
    padding: 0 8px;
  }

  /* Trait bars */
  .traits {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 16px;
  }
  .traits h3 {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    margin-bottom: 20px;
    color: var(--text);
  }
  .trait-row { margin-bottom: 18px; }
  .trait-row:last-child { margin-bottom: 0; }
  .trait-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 6px;
  }
  .trait-name { color: var(--text); }
  .trait-val  { color: var(--muted); }
  .trait-bar  { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .trait-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--bar-from, #6060ff), var(--bar-to, var(--gold)));
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 1.2s cubic-bezier(0.4,0,0.2,1);
  }

  /* Spectrum */
  .spectrum {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 16px;
  }
  .spectrum h3 { font-family: 'Noto Serif SC', serif; font-size: 16px; margin-bottom: 20px; }
  .spectrum-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .spectrum-bar {
    height: 12px;
    border-radius: 6px;
    background: linear-gradient(90deg, #1a1080 0%, #6060ff 25%, var(--gold) 60%, var(--sun) 80%, #ff4020 100%);
    position: relative;
    margin-bottom: 8px;
  }
  .spectrum-pointer {
    position: absolute;
    top: -6px;
    transform: translateX(-50%);
    transition: left 1.2s cubic-bezier(0.4,0,0.2,1);
  }
  .spectrum-pointer-inner {
    width: 24px;
    height: 24px;
    background: white;
    border-radius: 50%;
    border: 3px solid var(--gold);
    box-shadow: 0 0 12px rgba(245,200,66,0.5);
  }
  .spectrum-note { font-size: 11px; color: var(--muted); text-align: center; }

  /* Persona card */
  .persona {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 16px;
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
  .persona-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--result-from, #6060ff), var(--result-to, var(--gold)));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.1);
  }
  .persona-info { flex: 1; }
  .persona-tag {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .persona-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .persona-role { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .persona-quote {
    font-size: 13px;
    line-height: 1.7;
    color: #b0a8cc;
    border-left: 2px solid var(--gold);
    padding-left: 12px;
    font-style: italic;
  }

  /* Tips */
  .tips {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 24px;
  }
  .tips h3 { font-family: 'Noto Serif SC', serif; font-size: 16px; margin-bottom: 16px; }
  .tip-item {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
    font-size: 13px;
    line-height: 1.7;
    color: #b0a8cc;
  }
  .tip-item:last-child { margin-bottom: 0; }
  .tip-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  .btn-restart {
    display: block;
    width: 100%;
    padding: 16px;
    text-align: center;
    border-radius: 40px;
    background: linear-gradient(135deg, #6060ff, var(--gold), var(--sun));
    color: #0d0d1a;
    font-weight: 700;
    font-size: 15px;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  .btn-restart:hover { opacity: 0.9; transform: scale(1.02); }

  /* Cover page */
  .cover { text-align: center; animation: fadeUp 0.8s ease both; }
  .cover-illustration {
    width: 180px;
    height: 180px;
    margin: 0 auto 32px;
    position: relative;
  }
  .cover-circle {
    position: absolute;
    border-radius: 50%;
  }
  .cover-moon {
    width: 120px; height: 120px;
    background: radial-gradient(circle at 35% 35%, var(--moon), #4060a0);
    top: 0; left: 0;
    box-shadow: 0 0 40px rgba(100,140,220,0.3);
    animation: floatMoon 4s ease-in-out infinite alternate;
  }
  .cover-sun {
    width: 90px; height: 90px;
    background: radial-gradient(circle at 40% 40%, #ffe070, var(--sun));
    bottom: 0; right: 0;
    box-shadow: 0 0 40px rgba(255,140,60,0.4);
    animation: floatSun 4s 0.5s ease-in-out infinite alternate;
  }
  @keyframes floatMoon { from { transform: translateY(0); } to { transform: translateY(-8px); } }
  @keyframes floatSun  { from { transform: translateY(0); } to { transform: translateY(8px); } }

  .cover h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(28px, 7vw, 44px);
    font-weight: 900;
    line-height: 1.2;
    background: linear-gradient(135deg, var(--moon), var(--gold), var(--sun));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .cover-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
    line-height: 1.8;
  }
  .cover-meta {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 28px 0 36px;
    flex-wrap: wrap;
  }
  .cover-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .cover-stat-num {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--gold);
  }
  .cover-stat-label { font-size: 11px; color: var(--muted); }
  .cover-divider { width: 1px; background: var(--border); }

  /* Responsive */
  @media (max-width: 480px) {
    .question-card { padding: 24px 20px; }
    .persona { flex-direction: column; }
    .persona-avatar { margin: 0 auto; }
    .persona-info { text-align: center; }
    .persona-quote { text-align: left; }
  }
</style>
</head>
<body>

<!-- Starfield -->
<div class="starfield" id="starfield"></div>
<div class="orb orb-moon"></div>
<div class="orb orb-sun"></div>

<div class="container">
  <!-- Cover -->
  <div class="cover" id="cover">
    <div class="cover-illustration">
      <div class="cover-circle cover-moon"></div>
      <div class="cover-circle cover-sun"></div>
    </div>
    <div class="header-badge">晨间人格测试</div>
    <h1>你适合<br>晨间做什么？</h1>
    <p class="cover-sub">同样是早起，有人适合思考，有人适合运动<br>有人适合创作，有人适合把账算清楚<br>测一测，找到属于你的黄金晨间方式</p>
    <div class="cover-meta">
      <div class="cover-stat">
        <span class="cover-stat-num">10</span>
        <span class="cover-stat-label">道题目</span>
      </div>
      <div class="cover-divider"></div>
      <div class="cover-stat">
        <span class="cover-stat-num">3</span>
        <span class="cover-stat-label">分钟</span>
      </div>
      <div class="cover-divider"></div>
      <div class="cover-stat">
        <span class="cover-stat-num">4</span>
        <span class="cover-stat-label">种结果</span>
      </div>
    </div>
    <button class="btn-restart" onclick="startQuiz()">开始测试</button>
  </div>

  <!-- Quiz -->
  <div id="quiz" style="display:none">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="q-progress">第 1 题 / 共 10 题</span>
        <span id="q-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>

    <div class="question-card" id="question-card">
      <div class="q-number" id="q-number">QUESTION 01</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
    </div>

    <div class="nav">
      <button class="btn btn-ghost" id="btn-prev" onclick="prevQ()">← 上一题</button>
      <button class="btn btn-primary" id="btn-next" onclick="nextQ()" disabled>下一题 →</button>
    </div>
  </div>

  <!-- Result -->
  <div class="result" id="result"></div>
</div>

<script>
// ─── Stars ───────────────────────────────────────────────
const sf = document.getElementById('starfield');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%; top:${Math.random()*100}%;
    --min:${Math.random()*0.1+0.05}; --max:${Math.random()*0.6+0.2};
    --d:${Math.random()*3+2}s;
    animation-delay:${Math.random()*4}s;
  `;
  sf.appendChild(s);
}

// ─── Questions ────────────────────────────────────────────
// 5个维度：0=自我探索型  1=专注效率型  2=晨间记账型  3=学习成长型  4=行动激活型
const questions = [
  {
    text: "早起之后，你最先想做的一件事是？",
    options: [
      { label: "静下来，感受一下自己今天的状态和情绪", dim: 0 },
      { label: "打开任务清单，把今天的事情排一排", dim: 2 },
      { label: "读点东西——文章、书、或者播客", dim: 3 },
      { label: "动起来，拉伸、运动、让身体先醒", dim: 4 },
      { label: "坐着喝杯水，让思路自然流动", dim: 1 },
    ]
  },
  {
    text: "你觉得「一个好的早晨」最核心的感觉是什么？",
    options: [
      { label: "想通了某件事，或者对自己更清晰了一点", dim: 0 },
      { label: "今天要做的事都安排好了，心里有底", dim: 2 },
      { label: "学到了新东西，脑子有点被打开的感觉", dim: 3 },
      { label: "身体动过了，整个人精神起来了", dim: 4 },
      { label: "进入了专注状态，做完了一件重要的事", dim: 1 },
    ]
  },
  {
    text: "如果给你两小时不被打扰的早晨，你最想用来做什么？",
    options: [
      { label: "写日记，或者梳理一下自己最近的状态", dim: 0 },
      { label: "记账、复盘、整理目标和计划", dim: 2 },
      { label: "深度阅读，或者把一个感兴趣的主题研究透", dim: 3 },
      { label: "运动、冥想，把身体和状态调到最佳", dim: 4 },
      { label: "专心做一件工作上或生活里的重要事", dim: 1 },
    ]
  },
  {
    text: "早上没做到哪件事，你整天都会觉得有点亏？",
    options: [
      { label: "没有安静地跟自己待一会儿，就被各种事拖走了", dim: 0 },
      { label: "没有把收支记清楚，不知道钱去哪了", dim: 2 },
      { label: "没有输入任何新东西，感觉脑子原地踏步", dim: 3 },
      { label: "没有动一下，整天都懒懒的", dim: 4 },
      { label: "被手机打断了，没能做完那件最重要的事", dim: 1 },
    ]
  },
  {
    text: "你最认同哪种「早起理由」？",
    options: [
      { label: "早晨是唯一属于自己的时间，用来认识自己", dim: 0 },

// ─── Scoring: 5-dim ────────────────────────────────────────
let current = 0;
let answers = new Array(questions.length).fill(null);

function startQuiz() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);

  document.getElementById('q-progress').textContent = '第 ' + (current+1) + ' 题 / 共 ' + questions.length + ' 题';
  document.getElementById('q-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-number').textContent = 'QUESTION ' + String(current+1).padStart(2,'0');
  document.getElementById('q-text').textContent = q.text;

  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answers[current] === i ? ' selected' : '');
    div.innerHTML = '<div class="option-dot"></div><span class="option-label">' + opt.label + '</span>';
    div.onclick = () => selectOption(i);
    optEl.appendChild(div);
  });

  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = answers[current] === null;
  document.getElementById('btn-next').textContent = current === questions.length-1 ? '查看结果 ✦' : '下一题 →';

  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = 'fadeUp 0.4s ease both'; });
}

function selectOption(i) {
  answers[current] = i;
  document.querySelectorAll('.option').forEach((el, j) => {
    el.classList.toggle('selected', j === i);
  });
  document.getElementById('btn-next').disabled = false;
}

function nextQ() {
  if (current < questions.length - 1) { current++; renderQuestion(); }
  else showResult();
}

function prevQ() {
  if (current > 0) { current--; renderQuestion(); }
}

function showResult() {
  // 统计5维度得分
  const scores = [0, 0, 0, 0, 0];
  answers.forEach((a, qi) => {
    if (a !== null) scores[questions[qi].options[a].dim]++;

  const winIdx = scores.indexOf(maxScore);

      type.morning.map(m => {
        return '<div class="tip-item">' +
          '<span class="tip-icon">' + m.icon + '</span>' +
          '<div><strong style="color:#e8e0f0;display:block;margin-bottom:4px">' + m.title + '</strong>' + m.text + '</div>' +
        '</div>';
      }).join('') +
    '</div>' +

    '<button class="btn-restart" onclick="restartQuiz()">重新测试</button>';

  requestAnimationFrame(() => {
    setTimeout(() => {
      const rfg = document.getElementById('ring-fg');
      if (rfg) rfg.style.strokeDashoffset = offset;
    }, 300);

    scores.forEach((s, i) => {
      setTimeout(() => {
        const el = document.getElementById('dim-' + i);
        if (el) el.style.transform = 'scaleX(' + (s / questions.length) + ')';
      }, 400 + i * 120);
    });

    type.traits.forEach((t, i) => {
      setTimeout(() => {
        const el = document.getElementById('trait-' + i);
        if (el) el.style.transform = 'scaleX(' + (t.pct / 100) + ')';
      }, 1050 + i * 120);
    });
  });
}

function restartQuiz() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function startQuiz() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);

  document.getElementById('q-progress').textContent = '第 ' + (current+1) + ' 题 / 共 ' + questions.length + ' 题';
  document.getElementById('q-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-number').textContent = 'QUESTION ' + String(current+1).padStart(2,'0');
  document.getElementById('q-text').textContent = q.text;

  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answers[current] === i ? ' selected' : '');
    div.innerHTML = '<div class="option-dot"></div><span class="option-label">' + opt.label + '</span>';
    div.onclick = () => selectOption(i);
    optEl.appendChild(div);
  });

  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = answers[current] === null;
  document.getElementById('btn-next').textContent = current === questions.length-1 ? '查看结果 ✦' : '下一题 →';

  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = 'fadeUp 0.4s ease both'; });
}

function selectOption(i) {
  answers[current] = i;
  document.querySelectorAll('.option').forEach((el, j) => {
    el.classList.toggle('selected', j === i);
  });
  document.getElementById('btn-next').disabled = false;
}

function nextQ() {
  if (current < questions.length - 1) { current++; renderQuestion(); }
  else showResult();
}

function prevQ() {
  if (current > 0) { current--; renderQuestion(); }
}

function showResult() {
  // 统计四维度得分
  const scores = [0, 0, 0, 0];
  answers.forEach((a, qi) => {
    if (a !== null) scores[questions[qi].options[a].dim]++;
  });

  // 找最高分维度
  const maxScore = Math.max(...scores);
  const winIdx = scores.indexOf(maxScore);
  const type = types[winIdx];

  // 计算各维度百分比（用于展示）
  const dimNames = ['思考型', '行动型', '创作型', '整理型'];
  const total = scores.reduce((a,b) => a+b, 0);

  document.getElementById('quiz').style.display = 'none';
  const r = document.getElementById('result');
  r.style.display = 'block';

  const circumference = 2 * Math.PI * 30;
  const pct = maxScore / questions.length;
  const offset = circumference * (1 - pct);

  r.innerHTML =
    '<div class="result-hero" style="--accent-color:' + type.accent + '">' +
      '<span class="result-emoji">' + type.emoji + '</span>' +
      '<div class="result-type-label">你的晨间人格</div>' +
      '<div class="result-title" style="--result-from:' + type.colorFrom + ';--result-to:' + type.colorTo + '">' + type.title + '</div>' +
      '<div class="result-subtitle">' + type.subtitle + '</div>' +
      '<div class="result-score-ring">' +
        '<svg width="80" height="80" viewBox="0 0 80 80">' +
          '<circle class="ring-bg" cx="40" cy="40" r="30"/>' +
          '<circle class="ring-fg" cx="40" cy="40" r="30" stroke="' + type.ringColor + '" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + circumference + '" id="ring-fg"/>' +
        '</svg>' +
        '<div class="ring-label">' + maxScore + '<span>/' + questions.length + '</span></div>' +
      '</div>' +
      '<p class="result-desc">' + type.desc + '</p>' +
    '</div>' +

    '<div class="traits">' +
      '<h3>⟶ 你的四维晨间倾向</h3>' +
      scores.map((s, i) => {
        const barPct = Math.round((s / questions.length) * 100);
        return '<div class="trait-row">' +
          '<div class="trait-meta"><span class="trait-name">' + dimNames[i] + '</span><span class="trait-val">' + s + ' / ' + questions.length + ' 题</span></div>' +
          '<div class="trait-bar"><div class="trait-fill" id="dim-' + i + '" style="--bar-from:' + type.barFrom + ';--bar-to:' + type.barTo + '"></div></div>' +
        '</div>';
      }).join('') +
    '</div>' +

    '<div class="traits">' +
      '<h3>⟶ 你的晨间能力图谱</h3>' +
      type.traits.map((t, i) => {
        return '<div class="trait-row">' +
          '<div class="trait-meta"><span class="trait-name">' + t.name + '</span><span class="trait-val">' + t.val + '</span></div>' +
          '<div class="trait-bar"><div class="trait-fill" id="trait-' + i + '" style="--bar-from:' + type.barFrom + ';--bar-to:' + type.barTo + '"></div></div>' +
        '</div>';
      }).join('') +
    '</div>' +

    '<div class="persona">' +
      '<div class="persona-avatar" style="--result-from:' + type.colorFrom + ';--result-to:' + type.colorTo + '">' + type.persona.emoji + '</div>' +
      '<div class="persona-info">' +
        '<div class="persona-tag">与你同频的参考人物</div>' +
        '<div class="persona-name">' + type.persona.name + '</div>' +
        '<div class="persona-role">' + type.persona.role + '</div>' +
        '<div class="persona-quote">' + type.persona.quote + '</div>' +
      '</div>' +
    '</div>' +

    '<div class="tips">' +
      '<h3>✦ 适合你的晨间三件事</h3>' +
      type.morning.map(m => {
        return '<div class="tip-item">' +
          '<span class="tip-icon">' + m.icon + '</span>' +
          '<div><strong style="color:#e8e0f0;display:block;margin-bottom:4px">' + m.title + '</strong>' + m.text + '</div>' +
        '</div>';
      }).join('') +
    '</div>' +

    '<button class="btn-restart" onclick="restartQuiz()">重新测试</button>';

  requestAnimationFrame(() => {
    setTimeout(() => {
      const rfg = document.getElementById('ring-fg');
      if (rfg) rfg.style.strokeDashoffset = offset;
    }, 300);

    scores.forEach((s, i) => {
      setTimeout(() => {
        const el = document.getElementById('dim-' + i);
        if (el) el.style.transform = 'scaleX(' + (s / questions.length) + ')';
      }, 400 + i * 150);
    });

    type.traits.forEach((t, i) => {
      setTimeout(() => {
        const el = document.getElementById('trait-' + i);
        if (el) el.style.transform = 'scaleX(' + (t.pct / 100) + ')';
      }, 1000 + i * 150);
    });
  });
}

</script>
</body>
</html>
